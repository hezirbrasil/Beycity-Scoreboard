<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeyCity — Contador de Pontos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#08070c;
    --bg-1:#100c18;
    --bg-2:#181224;
    --purple-deep:#3d1a63;
    --purple:#7b2ff7;
    --purple-bright:#a855f7;
    --magenta:#d946ef;
    --line:#2a2038;
    --text-hi:#f3ecff;
    --text-mid:#b7a9d1;
    --text-low:#6f6285;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 8%, rgba(123,47,247,0.18), transparent 45%),
      radial-gradient(circle at 85% 92%, rgba(217,70,239,0.14), transparent 45%),
      var(--bg-0);
    color:var(--text-hi);
    font-family:'Rajdhani',sans-serif;
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }
  .app{
    width:100%;
    max-width:920px;
  }

  /* ---------- Header ---------- */
  header{
    text-align:center;
    margin-bottom:28px;
  }
  .logo{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:clamp(34px,7vw,52px);
    letter-spacing:4px;
    margin:0;
    background:linear-gradient(90deg,var(--purple-bright),var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .logo span{color:var(--text-hi); -webkit-text-fill-color:var(--text-hi);}
  .tagline{
    color:var(--text-mid);
    font-size:14px;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-top:2px;
  }

  /* ---------- Settings bar ---------- */
  .settings{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    background:var(--bg-1);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 20px;
    margin-bottom:28px;
  }
  .settings-label{
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-mid);
  }
  .target-options{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .target-btn{
    font-family:'Orbitron',sans-serif;
    font-size:14px;
    padding:8px 16px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--bg-2);
    color:var(--text-mid);
    cursor:pointer;
    transition:.15s;
  }
  .target-btn:hover{border-color:var(--purple-bright);}
  .target-btn.active{
    background:linear-gradient(135deg,var(--purple),var(--magenta));
    color:#fff;
    border-color:transparent;
  }
  .target-custom{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .target-custom input{
    width:56px;
    padding:8px 10px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--bg-2);
    color:var(--text-hi);
    font-family:'Orbitron',sans-serif;
    font-size:14px;
    text-align:center;
  }
  .target-custom input:focus{outline:none; border-color:var(--purple-bright);}

  /* ---------- Battle area ---------- */
  .arena{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:16px;
    align-items:start;
  }
  @media (max-width:680px){
    .arena{grid-template-columns:1fr; }
    .vs-col{order:3; margin-top:8px;}
  }

  .player{
    background:var(--bg-1);
    border:1px solid var(--line);
    border-radius:20px;
    padding:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    position:relative;
    overflow:hidden;
  }
  .player.winner{
    border-color:var(--magenta);
    box-shadow:0 0 0 1px var(--magenta), 0 0 32px rgba(217,70,239,0.35);
  }
  .player-name{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--line);
    color:var(--text-hi);
    font-family:'Orbitron',sans-serif;
    font-size:16px;
    text-align:center;
    padding:6px 4px 10px;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .player-name:focus{outline:none; border-bottom-color:var(--purple-bright);}

  .stadium{
    width:170px;
    height:170px;
    position:relative;
  }
  .stadium svg{width:100%;height:100%;display:block;}
  .score-num{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:52px;
    color:var(--text-hi);
    text-shadow:0 0 22px rgba(168,85,247,0.55);
  }
  .stadium.pulse .ring-anim{
    animation:ringpulse .5s ease-out;
  }
  @keyframes ringpulse{
    0%{ opacity:1; transform:scale(0.85); }
    100%{ opacity:0; transform:scale(1.3); }
  }

  .point-btns{
    display:flex;
    gap:10px;
    width:100%;
  }
  .pt-btn{
    flex:1;
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    font-size:15px;
    padding:12px 0;
    border-radius:12px;
    border:1px solid var(--purple-deep);
    background:var(--bg-2);
    color:var(--text-hi);
    cursor:pointer;
    transition:.15s;
  }
  .pt-btn:hover{
    background:linear-gradient(135deg,var(--purple),var(--magenta));
    border-color:transparent;
    transform:translateY(-2px);
  }
  .pt-btn:active{transform:translateY(0);}

  .undo-btn{
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-low);
    background:none;
    border:none;
    cursor:pointer;
    padding:2px;
  }
  .undo-btn:hover{color:var(--text-mid);}

  .history{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    justify-content:center;
    min-height:22px;
  }
  .history span{
    font-size:12px;
    color:var(--text-low);
    border:1px solid var(--line);
    border-radius:8px;
    padding:2px 7px;
  }

  /* ---------- VS divider ---------- */
  .vs-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding-top:40px;
  }
  .vs-spin{
    width:56px;
    height:56px;
    animation:spin 3.2s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .vs-text{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:20px;
    color:var(--text-low);
    letter-spacing:2px;
  }

  .timer-box{
    margin-top:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    background:var(--bg-1);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
  }
  .timer-label{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-low);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .timer-tag{
    font-size:9px;
    letter-spacing:1px;
    color:var(--purple-bright);
    border:1px solid var(--purple-deep);
    border-radius:6px;
    padding:1px 5px;
  }
  .timer-display{
    font-family:'Orbitron',sans-serif;
    font-weight:800;
    font-size:26px;
    color:var(--text-hi);
  }
  .timer-btns{
    display:flex;
    gap:8px;
  }
  .timer-btn{
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:6px 12px;
    border-radius:9px;
    border:1px solid var(--purple-deep);
    background:var(--bg-2);
    color:var(--text-mid);
    cursor:pointer;
    transition:.15s;
  }
  .timer-btn:hover{
    background:linear-gradient(135deg,var(--purple),var(--magenta));
    color:#fff;
    border-color:transparent;
  }
  .timer-btn.active{
    background:linear-gradient(135deg,var(--purple),var(--magenta));
    color:#fff;
    border-color:transparent;
  }

  /* ---------- Bottom controls ---------- */
  .bottom-controls{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:26px;
  }
  .ghost-btn{
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:11px 22px;
    border-radius:12px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--text-mid);
    cursor:pointer;
    transition:.15s;
  }
  .ghost-btn:hover{border-color:var(--purple-bright); color:var(--text-hi);}

  /* ---------- Winner overlay ---------- */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(6,4,10,0.82);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:20;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .overlay-card{
    background:var(--bg-1);
    border:1px solid var(--purple-bright);
    box-shadow:0 0 60px rgba(168,85,247,0.35);
    border-radius:22px;
    padding:40px 36px;
    text-align:center;
    max-width:360px;
  }
  .overlay-eyebrow{
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--text-mid);
    margin-bottom:6px;
  }
  .overlay-winner{
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:30px;
    background:linear-gradient(90deg,var(--purple-bright),var(--magenta));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin:0 0 22px;
    word-break:break-word;
  }
  .overlay-btn{
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    font-size:14px;
    padding:12px 26px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg,var(--purple),var(--magenta));
    color:#fff;
    cursor:pointer;
  }

  footer{
    text-align:center;
    margin-top:36px;
    color:var(--text-low);
    font-size:12px;
    letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1 class="logo">BEY<span>CITY</span></h1>
    <div class="tagline">Contador de pontos de Beyblade</div>
  </header>

  <div class="settings">
    <span class="settings-label">Pontos para vencer</span>
    <div class="target-custom">
      <input type="number" id="customTarget" min="1" max="10" value="4" placeholder="4">
    </div>
  </div>

  <div class="arena">
    <div class="player" id="player1">
      <input class="player-name" id="name1" value="Blader 1" maxlength="18">
      <div class="stadium" id="stadium1">
        <svg viewBox="0 0 170 170">
          <defs>
            <radialGradient id="bowlGrad1" cx="50%" cy="40%" r="65%">
              <stop offset="0%" stop-color="#241933"/>
              <stop offset="100%" stop-color="#0d0913"/>
            </radialGradient>
          </defs>
          <circle cx="85" cy="85" r="80" fill="url(#bowlGrad1)" stroke="#3d1a63" stroke-width="2"/>
          <circle class="ring-anim" cx="85" cy="85" r="80" fill="none" stroke="#d946ef" stroke-width="3" opacity="0"/>
          <circle cx="85" cy="85" r="62" fill="none" stroke="#3d1a63" stroke-width="1"/>
        </svg>
        <div class="score-num" id="score1">0</div>
      </div>
      <div class="point-btns">
        <button class="pt-btn" data-player="1" data-pts="1">+1</button>
        <button class="pt-btn" data-player="1" data-pts="2">+2</button>
        <button class="pt-btn" data-player="1" data-pts="3">+3</button>
      </div>
      <button class="undo-btn" data-player="1">desfazer último ponto</button>
      <div class="history" id="history1"></div>
    </div>

    <div class="vs-col">
      <svg class="vs-spin" viewBox="0 0 100 100" id="vsSpin">
        <polygon points="50,6 61,38 95,38 68,58 78,92 50,71 22,92 32,58 5,38 39,38"
                 fill="#a855f7" opacity="0.9"/>
        <circle cx="50" cy="50" r="14" fill="#0d0913"/>
      </svg>
      <div class="vs-text">VS</div>

      <div class="timer-box">
        <div class="timer-label">cronômetro <span class="timer-tag">opcional</span></div>
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="timer-btns">
          <button class="timer-btn" id="timerStart">iniciar</button>
          <button class="timer-btn" id="timerReset">zerar</button>
        </div>
      </div>
    </div>

    <div class="player" id="player2">
      <input class="player-name" id="name2" value="Blader 2" maxlength="18">
      <div class="stadium" id="stadium2">
        <svg viewBox="0 0 170 170">
          <defs>
            <radialGradient id="bowlGrad2" cx="50%" cy="40%" r="65%">
              <stop offset="0%" stop-color="#241933"/>
              <stop offset="100%" stop-color="#0d0913"/>
            </radialGradient>
          </defs>
          <circle cx="85" cy="85" r="80" fill="url(#bowlGrad2)" stroke="#3d1a63" stroke-width="2"/>
          <circle class="ring-anim" cx="85" cy="85" r="80" fill="none" stroke="#d946ef" stroke-width="3" opacity="0"/>
          <circle cx="85" cy="85" r="62" fill="none" stroke="#3d1a63" stroke-width="1"/>
        </svg>
        <div class="score-num" id="score2">0</div>
      </div>
      <div class="point-btns">
        <button class="pt-btn" data-player="2" data-pts="1">+1</button>
        <button class="pt-btn" data-player="2" data-pts="2">+2</button>
        <button class="pt-btn" data-player="2" data-pts="3">+3</button>
      </div>
      <button class="undo-btn" data-player="2">desfazer último ponto</button>
      <div class="history" id="history2"></div>
    </div>
  </div>

  <div class="bottom-controls">
    <button class="ghost-btn" id="resetMatch">reiniciar partida</button>
  </div>

  <footer>beycity</footer>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="overlay-eyebrow">vencedor da partida</div>
    <p class="overlay-winner" id="winnerName">—</p>
    <button class="overlay-btn" id="newMatchBtn">nova partida</button>
  </div>
</div>

<script>
  const state = {
    target: 4,
    players: {
      1: { name: 'Blader 1', score: 0, history: [] },
      2: { name: 'Blader 2', score: 0, history: [] }
    },
    finished: false
  };

  const scoreEl = { 1: document.getElementById('score1'), 2: document.getElementById('score2') };
  const historyEl = { 1: document.getElementById('history1'), 2: document.getElementById('history2') };
  const playerEl = { 1: document.getElementById('player1'), 2: document.getElementById('player2') };
  const stadiumEl = { 1: document.getElementById('stadium1'), 2: document.getElementById('stadium2') };
  const nameInput = { 1: document.getElementById('name1'), 2: document.getElementById('name2') };
  const overlay = document.getElementById('overlay');
  const winnerNameEl = document.getElementById('winnerName');

  nameInput[1].addEventListener('input', e => state.players[1].name = e.target.value.trim() || 'Blader 1');
  nameInput[2].addEventListener('input', e => state.players[2].name = e.target.value.trim() || 'Blader 2');

  function renderHistory(p){
    historyEl[p].innerHTML = '';
    state.players[p].history.forEach(pts => {
      const span = document.createElement('span');
      span.textContent = '+' + pts;
      historyEl[p].appendChild(span);
    });
  }

  function pulse(p){
    const s = stadiumEl[p];
    s.classList.remove('pulse');
    void s.offsetWidth;
    s.classList.add('pulse');
  }

  function addPoint(p, pts){
    if(state.finished) return;
    state.players[p].score += pts;
    state.players[p].history.push(pts);
    scoreEl[p].textContent = state.players[p].score;
    renderHistory(p);
    pulse(p);
    checkWinner();
  }

  function undoPoint(p){
    if(state.finished || state.players[p].history.length === 0) return;
    const last = state.players[p].history.pop();
    state.players[p].score -= last;
    scoreEl[p].textContent = state.players[p].score;
    renderHistory(p);
  }

  function checkWinner(){
    for(const p of [1,2]){
      if(state.players[p].score >= state.target){
        state.finished = true;
        playerEl[p].classList.add('winner');
        winnerNameEl.textContent = state.players[p].name;
        overlay.classList.add('show');
        return;
      }
    }
  }

  function resetMatch(){
    state.finished = false;
    for(const p of [1,2]){
      state.players[p].score = 0;
      state.players[p].history = [];
      scoreEl[p].textContent = '0';
      renderHistory(p);
      playerEl[p].classList.remove('winner');
    }
    overlay.classList.remove('show');
    if(typeof resetTimer === 'function') resetTimer();
  }

  document.querySelectorAll('.pt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      addPoint(Number(btn.dataset.player), Number(btn.dataset.pts));
    });
  });

  document.querySelectorAll('.undo-btn').forEach(btn => {
    btn.addEventListener('click', () => undoPoint(Number(btn.dataset.player)));
  });

  document.getElementById('resetMatch').addEventListener('click', resetMatch);
  document.getElementById('newMatchBtn').addEventListener('click', resetMatch);

  const customTarget = document.getElementById('customTarget');

  customTarget.addEventListener('input', () => {
    let v = Number(customTarget.value);
    if(v > 10){ v = 10; customTarget.value = 10; }
    if(v < 1){ v = 1; }
    state.target = v;
  });

  // Cronômetro opcional
  let timerSeconds = 0;
  let timerInterval = null;
  let timerRunning = false;

  const timerDisplay = document.getElementById('timerDisplay');
  const timerStartBtn = document.getElementById('timerStart');
  const timerResetBtn = document.getElementById('timerReset');
  const vsSpin = document.getElementById('vsSpin');

  function formatTime(total){
    const m = Math.floor(total / 60).toString().padStart(2, '0');
    const s = (total % 60).toString().padStart(2, '0');
    return m + ':' + s;
  }

  function tickTimer(){
    timerSeconds++;
    timerDisplay.textContent = formatTime(timerSeconds);
  }

  function startTimer(){
    timerRunning = true;
    timerStartBtn.textContent = 'pausar';
    timerStartBtn.classList.add('active');
    vsSpin.style.animationPlayState = 'running';
    timerInterval = setInterval(tickTimer, 1000);
  }

  function pauseTimer(){
    timerRunning = false;
    timerStartBtn.textContent = 'iniciar';
    timerStartBtn.classList.remove('active');
    clearInterval(timerInterval);
  }

  function resetTimer(){
    pauseTimer();
    timerSeconds = 0;
    timerDisplay.textContent = formatTime(0);
  }

  timerStartBtn.addEventListener('click', () => {
    if(timerRunning) pauseTimer();
    else startTimer();
  });

  timerResetBtn.addEventListener('click', resetTimer);
</script>

</body>
</html>
